<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio – BTS SIO SISR</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== TITLE SCREEN ===== -->
  <div id="title-screen" class="screen active">
    <div class="title-content">
      <div class="pixel-logo">
        <span class="logo-bracket">&lt;</span>
        <span class="logo-name">Redahfir</span>
        <span class="logo-bracket">/&gt;</span>
      </div>
      <p class="subtitle">BTS SIO · option SISR</p>
      <div class="blink-text">▶ APPUYER SUR ENTRÉE POUR COMMENCER</div>
      <div class="title-hint">ZQSD / Flèches pour se déplacer · E pour interagir</div>
    </div>
    <div class="scanlines"></div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div id="hud-left">
        <span class="hud-label">ZONE :</span>
        <span id="hud-zone">Hub</span>
      </div>
      <div id="hud-center">
        <span class="hud-title">REDA BOUALI · BTS SIO SISR</span>
      </div>
      <div id="hud-right">
        <span class="hud-label">[ E ] Interagir</span>
      </div>
    </div>

    <div id="canvas-wrapper">
      <canvas id="game-canvas" width="800" height="480"></canvas>
      <div class="scanlines overlay-scanlines"></div>
    </div>

    <!-- Zone map minimap -->
    <div id="minimap">
      <div class="minimap-label">CARTE</div>
      <div id="minimap-zones">
        <div class="mz" data-zone="hub">🏠 Hub</div>
        <div class="mz" data-zone="about">👤 Profil</div>
        <div class="mz" data-zone="skills">⚔️ Compétences</div>
        <div class="mz" data-zone="projects">🗂️ Projets</div>
        <div class="mz" data-zone="contact">📡 Contact</div>
      </div>
    </div>
  </div>

  <!-- ===== DIALOG BOX ===== -->
  <div id="dialog" class="hidden">
    <div id="dialog-inner">
      <div id="dialog-portrait"></div>
      <div id="dialog-body">
        <div id="dialog-title"></div>
        <div id="dialog-text"></div>
      </div>
    </div>
    <div id="dialog-hint">[ E ] Continuer  [ Échap ] Fermer</div>
  </div>

  <!-- ===== PANEL OVERLAY (projets, compétences...) ===== -->
  <div id="panel" class="hidden">
    <div id="panel-inner">
      <button id="panel-close">✕</button>
      <div id="panel-content"></div>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
